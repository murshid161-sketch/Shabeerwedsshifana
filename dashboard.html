<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard · Shifana & Shabeer Ali</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=Inter+Tight:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
:root{
  --bg:#1a0808;
  --card:#2a1010;
  --border:rgba(176,141,91,.2);
  --gold:#b08d5b;
  --gold-hi:#f3dfa1;
  --ivory:#f5efe3;
  --micro:'Inter Tight',sans-serif;
  --serif:'Fraunces',serif;
}
body{background:var(--bg);color:var(--ivory);font-family:var(--micro);min-height:100vh;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
.login-box{width:min(340px,90vw);padding:2.5rem;border:1px solid var(--border);background:var(--card);}
.login-box h2{font-family:var(--serif);font-style:italic;font-weight:300;font-size:1.8rem;color:var(--gold-hi);text-align:center;margin-bottom:.3rem;}
.login-box p{font-size:.6rem;letter-spacing:.3em;color:var(--gold);text-align:center;margin-bottom:2rem;}
.login-box input{width:100%;padding:.9rem 1rem;background:transparent;border:1px solid var(--border);color:var(--ivory);font-family:var(--micro);font-size:.9rem;margin-bottom:1rem;outline:none;transition:border-color .3s;}
.login-box input:focus{border-color:var(--gold);}
.login-box button{width:100%;padding:1rem;background:var(--gold);color:#1a0808;font-family:var(--micro);font-size:.6rem;letter-spacing:.4em;border:none;cursor:pointer;transition:background .3s;}
.login-box button:hover{background:var(--gold-hi);}
.login-err{font-size:.65rem;color:#e07070;text-align:center;margin-top:.5rem;display:none;}

/* MAIN */
#main{display:none;padding:1.5rem;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid var(--border);margin:-1.5rem -1.5rem 1.5rem;background:rgba(26,8,8,.8);backdrop-filter:blur(6px);position:sticky;top:0;z-index:10;}
.topbar .brand{font-family:var(--serif);font-style:italic;color:var(--gold-hi);font-size:1.1rem;}
.topbar .tag{font-size:.52rem;letter-spacing:.3em;color:var(--ivory);opacity:.5;}
.back-btn{font-size:.55rem;letter-spacing:.3em;color:var(--gold);text-decoration:none;border:1px solid var(--border);padding:.4rem .8rem;transition:all .3s;}
.back-btn:hover{background:var(--gold);color:#1a0808;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.5rem;}
.stat{padding:1.25rem;border:1px solid var(--border);background:var(--card);text-align:center;}
.stat .num{font-family:var(--serif);font-style:italic;font-size:2.8rem;color:var(--gold-hi);line-height:1;}
.stat .lbl{font-size:.52rem;letter-spacing:.3em;color:var(--gold);margin-top:.3rem;}
.stat .sub{font-size:.6rem;color:var(--ivory);opacity:.5;margin-top:.2rem;}

/* TABS */
.tabs{display:flex;gap:.5rem;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.75rem;}
.tab{font-size:.55rem;letter-spacing:.3em;color:var(--ivory);opacity:.5;padding:.4rem .8rem;cursor:pointer;border:1px solid transparent;transition:all .3s;}
.tab.active{color:var(--gold);opacity:1;border-color:var(--border);}

/* RSVP TABLE */
.panel{display:none;}
.panel.active{display:block;}
.rsvp-item{padding:1rem;border:1px solid var(--border);background:var(--card);margin-bottom:.5rem;display:grid;grid-template-columns:1fr auto;gap:.5rem;align-items:start;}
.rsvp-item .name{font-family:var(--serif);font-style:italic;font-size:1.1rem;color:var(--ivory);}
.rsvp-item .meta{font-size:.58rem;color:var(--ivory);opacity:.55;margin-top:.2rem;line-height:1.6;}
.badge{font-size:.5rem;letter-spacing:.25em;padding:.25rem .6rem;border-radius:2px;}
.badge.yes{background:rgba(176,141,91,.2);color:var(--gold-hi);border:1px solid rgba(176,141,91,.3);}
.badge.no{background:rgba(200,80,80,.15);color:#e07070;border:1px solid rgba(200,80,80,.2);}
.rsvp-msg{font-size:.7rem;font-style:italic;color:var(--ivory);opacity:.55;margin-top:.4rem;padding-top:.4rem;border-top:1px solid var(--border);}

.empty{text-align:center;padding:3rem;font-size:.65rem;letter-spacing:.2em;color:var(--ivory);opacity:.35;}
.loading{text-align:center;padding:2rem;font-size:.6rem;letter-spacing:.3em;color:var(--gold);opacity:.6;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:.8;}}

.share-box{padding:1.25rem;border:1px solid var(--border);background:var(--card);margin-bottom:.75rem;}
.share-box h4{font-size:.55rem;letter-spacing:.3em;color:var(--gold);margin-bottom:.75rem;}
.share-url{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;}
.share-url input{flex:1;padding:.6rem .75rem;background:transparent;border:1px solid var(--border);color:var(--ivory);font-size:.65rem;font-family:var(--micro);outline:none;}
.share-url button{padding:.6rem .9rem;background:var(--gold);color:#1a0808;border:none;font-size:.5rem;letter-spacing:.2em;cursor:pointer;white-space:nowrap;}
.guest-gen{display:flex;gap:.5rem;margin-top:.75rem;}
.guest-gen input{flex:1;padding:.7rem .8rem;background:transparent;border:1px solid var(--border);color:var(--ivory);font-size:.75rem;font-family:var(--micro);outline:none;}
.guest-gen input:focus{border-color:var(--gold);}
.guest-gen button{padding:.7rem 1rem;background:transparent;border:1px solid var(--gold);color:var(--gold);font-size:.5rem;letter-spacing:.25em;cursor:pointer;transition:all .3s;}
.guest-gen button:hover{background:var(--gold);color:#1a0808;}
.gen-result{margin-top:.6rem;font-size:.65rem;color:var(--gold-hi);word-break:break-all;padding:.6rem;border:1px solid var(--border);display:none;line-height:1.6;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Shifana & Shabeer</h2>
    <p>COUPLE DASHBOARD</p>
    <input type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button onclick="checkPw()">ENTER</button>
    <div class="login-err" id="loginErr">Incorrect password</div>
  </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="main">
  <div class="topbar">
    <div class="brand">S&amp;S Dashboard</div>
    <div class="tag">SHIFANA &amp; SHABEER ALI · JUNE 2026</div>
    <a class="back-btn" href="index.html">← INVITATION</a>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="num" id="statTotal">—</div>
      <div class="lbl">TOTAL RSVP</div>
    </div>
    <div class="stat">
      <div class="num" id="statAttending">—</div>
      <div class="lbl">ATTENDING</div>
      <div class="sub" id="statGuests">— guests</div>
    </div>
    <div class="stat">
      <div class="num" id="statDeclined">—</div>
      <div class="lbl">REGRETS</div>
    </div>
    <div class="stat">
      <div class="num" id="statPending">—</div>
      <div class="lbl">PENDING</div>
      <div class="sub">no reply yet</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('rsvp',this)">RSVP LIST</div>
    <div class="tab" onclick="switchTab('links',this)">GUEST LINKS</div>
  </div>

  <!-- RSVP PANEL -->
  <div class="panel active" id="panel-rsvp">
    <div class="loading" id="rsvpLoading">LOADING RESPONSES…</div>
    <div id="rsvpList"></div>
    <div class="empty" id="rsvpEmpty" style="display:none;">No responses yet</div>
  </div>

  <!-- LINKS PANEL -->
  <div class="panel" id="panel-links">
    <div class="share-box">
      <h4>INVITATION URL</h4>
      <div class="share-url">
        <input type="text" id="baseUrl" value="https://murshid161-sketch.github.io/Shabeerwedsshifana/" readonly/>
        <button onclick="copyUrl('baseUrl')">COPY</button>
      </div>
    </div>
    <div class="share-box">
      <h4>GENERATE GUEST LINK</h4>
      <div class="guest-gen">
        <input type="text" id="guestInput" placeholder="Guest name (e.g. Ahmed)" onkeydown="if(event.key==='Enter')genLink()"/>
        <button onclick="genLink()">GENERATE</button>
      </div>
      <div class="gen-result" id="genResult">
        <span id="genUrl"></span><br/>
        <button onclick="copyGen()" style="margin-top:.5rem;padding:.3rem .6rem;background:var(--gold);color:#1a0808;border:none;font-size:.5rem;letter-spacing:.2em;cursor:pointer;">COPY LINK</button>
        &nbsp;
        <button onclick="shareGen()" style="margin-top:.5rem;padding:.3rem .6rem;background:transparent;border:1px solid var(--gold);color:var(--gold);font-size:.5rem;letter-spacing:.2em;cursor:pointer;">SHARE VIA WHATSAPP</button>
      </div>
    </div>
  </div>
</div>

<script>
const PASSWORD = 'shabeerali2026';
const BASE_URL  = 'https://murshid161-sketch.github.io/Shabeerwedsshifana/';
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB41fvxvl1KeHOro6WKJ72o22izuCpJ-b4",
  authDomain:        "yaseen-jumana-wedding.firebaseapp.com",
  databaseURL:       "https://yaseen-jumana-wedding-default-rtdb.firebaseio.com",
  projectId:         "yaseen-jumana-wedding",
  storageBucket:     "yaseen-jumana-wedding.firebasestorage.app",
  messagingSenderId: "355557621111",
  appId:             "1:355557621111:web:d0b78c34bfe5a53b69f572"
};
const RSVP_PATH = 'shabeer-shifana/rsvp';

let db = null;
let allRsvp = [];

// ── LOGIN ──
function checkPw(){
  const val = document.getElementById('pwInput').value;
  if(val === PASSWORD){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('main').style.display='block';
    initFirebase();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
  }
}

// ── FIREBASE ──
function initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    loadRSVP();
  }catch(e){ console.warn('Firebase error',e); }
}

function loadRSVP(){
  if(!db) return;
  db.ref(RSVP_PATH).orderByChild('ts').on('value', snap=>{
    allRsvp = [];
    snap.forEach(c=>{ allRsvp.unshift({key:c.key,...c.val()}); });
    renderStats();
    renderList();
    document.getElementById('rsvpLoading').style.display='none';
  });
}

function renderStats(){
  const total = allRsvp.length;
  const yes   = allRsvp.filter(r=>r.attending==='yes');
  const no    = allRsvp.filter(r=>r.attending==='no');
  const guests = yes.reduce((s,r)=>s+(parseInt(r.members)||1),0);
  document.getElementById('statTotal').textContent     = total||'0';
  document.getElementById('statAttending').textContent = yes.length||'0';
  document.getElementById('statGuests').textContent    = guests+' guests total';
  document.getElementById('statDeclined').textContent  = no.length||'0';
  document.getElementById('statPending').textContent   = '0';
}

function renderList(){
  const list = document.getElementById('rsvpList');
  const empty = document.getElementById('rsvpEmpty');
  list.innerHTML = '';
  if(!allRsvp.length){ empty.style.display='block'; return; }
  empty.style.display='none';
  allRsvp.forEach(r=>{
    const date = r.ts ? new Date(r.ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    const div = document.createElement('div');
    div.className = 'rsvp-item';
    div.innerHTML = `
      <div>
        <div class="name">${esc(r.name||'—')}</div>
        <div class="meta">${date}${r.attending==='yes'?' · '+((r.members||1)+' guest'+(r.members>1?'s':'')):''}${r.event?' · '+r.event:''}</div>
        ${r.msg?`<div class="rsvp-msg">"${esc(r.msg)}"</div>`:''}
      </div>
      <span class="badge ${r.attending}">${r.attending==='yes'?'ATTENDING':'REGRETS'}</span>`;
    list.appendChild(div);
  });
}

// ── TABS ──
function switchTab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

// ── GUEST LINKS ──
function genLink(){
  const name = document.getElementById('guestInput').value.trim();
  if(!name) return;
  const url = BASE_URL + '?guest=' + encodeURIComponent(name);
  document.getElementById('genUrl').textContent = url;
  document.getElementById('genResult').style.display='block';
}
function copyGen(){
  navigator.clipboard.writeText(document.getElementById('genUrl').textContent);
  alert('Link copied!');
}
function shareGen(){
  const url = document.getElementById('genUrl').textContent;
  const name = document.getElementById('guestInput').value.trim();
  const msg = `Assalamu Alaikum ${name}! 🤍\n\nYou are cordially invited to the wedding reception of\n*Shifana & Shabeer Ali*\n\n📅 21 June 2026 · 5:30 PM\n📍 Safa Convention Center, Nellikuth\n\nView your invitation 👇\n${url}`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}
function copyUrl(id){
  navigator.clipboard.writeText(document.getElementById(id).value);
  alert('Copied!');
}

function esc(s){ return String(s||'').replace(/[<>"'&]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c])); }
</script>
</body>
</html>
